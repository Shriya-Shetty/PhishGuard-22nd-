<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhishGuard Advanced</title>

<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        margin: 0;
        background: linear-gradient(135deg, #e0f2fe, #ffffff);
        color: #0f172a;
    }

    header {
        padding: 20px;
        text-align: center;
        font-size: 28px;
        font-weight: bold;
        background: #bae6fd;
        color: #0f172a;
    }

    .container {
        max-width: 1400px;
        margin: 40px auto;
        padding: 20px;
        background: white;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    .tab-btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        background: #e2e8f0;
        color: #0f172a;
    }

    .tab-btn.active {
        background: #38bdf8;
        color: white;
    }

    input {
        width: 100%;
        padding: 10px 12px;
        margin-top: 10px;
        border-radius: 8px;
        border: 1px solid #cbd5f5;
        background: #f8fafc;
        color: #0f172a;
        height: 42px;
        box-sizing: border-box;
    }

    textarea {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border-radius: 8px;
        border: 1px solid #cbd5f5;
        background: #f8fafc;
        color: #0f172a;
        height: 120px;
        resize: vertical;
        box-sizing: border-box;
    }

    button.action {
        margin-top: 20px;
        padding: 12px;
        width: 100%;
        border: none;
        border-radius: 10px;
        background: #38bdf8;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    #result {
        margin-top: 30px;
        padding: 20px;
        border-radius: 10px;
        background: #f1f5f9;
        color: #0f172a;
    }

    .badge {
        padding: 8px 16px;
        border-radius: 20px;
        font-weight: bold;
        color: white;
    }

    .phish { background: #ef4444; }
    .legit { background: #22c55e; }
</style>

</head>

<body>

<header>🛡️ PhishGuard - Advanced Detection</header>

<div class="container">

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('url')">URL Detection</button>
        <button class="tab-btn" onclick="switchTab('email')">Email Detection</button>
    </div>

    <!-- URL -->
    <div id="urlTab">
        <h2>🔗 URL Detection</h2>
        <input id="urlInput" type="url" placeholder="Enter suspicious URL">
        <button class="action" onclick="analyzeURL()">Analyze URL</button>
    </div>

    <!-- EMAIL -->
    <div id="emailTab" style="display:none;">
        <h2>📧 Email Detection</h2>
        <textarea id="emailText" placeholder="Paste email content"></textarea>
        <input id="emailSender" type="email" placeholder="sender@example.com">
        <button class="action" onclick="analyzeEmail()">Analyze Email</button>
    </div>

    <div id="result">Results will appear here...</div>

</div>

<script>

function switchTab(tab) {
    document.getElementById('urlTab').style.display = 'none';
    document.getElementById('emailTab').style.display = 'none';

    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

    if (tab === 'url') {
        document.getElementById('urlTab').style.display = 'block';
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
    } else {
        document.getElementById('emailTab').style.display = 'block';
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
    }
}

// URL
async function analyzeURL() {
    const url = document.getElementById('urlInput').value;
    if (!url) return alert("Enter a URL");

    document.getElementById('result').innerHTML = "Analyzing URL...";

    try {
        const res = await fetch('/predict_url', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ url: url })
        });

        const data = await res.json();
        showResult(data, "URL Model");

    } catch {
        document.getElementById('result').innerHTML = "Error connecting to backend.";
    }
}

// Email
async function analyzeEmail() {
    const emailText = document.getElementById('emailText').value;
    const sender = document.getElementById('emailSender').value;

    if (!emailText) return alert("Enter email text");

    document.getElementById('result').innerHTML = "Analyzing Email...";

    try {
        const res = await fetch('/predict_email', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                email_text: emailText,
                email_address: sender
            })
        });

        const data = await res.json();
        showResult(data, "Email Model");

    } catch {
        document.getElementById('result').innerHTML = "Error connecting to backend.";
    }
}

// Result UI
function showResult(data, modelName) {
    const isPhish = data.classification === "Phishing";
    const prob = data.probability;

    const risk =
        prob > 0.7 ? "High 🚨" :
        prob > 0.4 ? "Medium ⚠️" :
        "Low ✅";

    document.getElementById('result').innerHTML = `
        <h2>${isPhish ? "🚨 PHISHING DETECTED" : "✅ LEGITIMATE"}</h2>
        <p>
            Confidence: ${(prob * 100).toFixed(2)}% <br>
            Risk Level: ${risk}
        </p>

        <span class="badge ${isPhish ? 'phish' : 'legit'}">
            ${data.classification}
        </span>

        <p class="note">Model used: ${modelName}</p>

        <div id="shapPlot"></div>
    `;

    if (data.top_shap) {
        Plotly.newPlot('shapPlot', [{
            x: Object.values(data.top_shap),
            y: Object.keys(data.top_shap),
            type: 'bar',
            orientation: 'h',
            marker: {
                color: Object.values(data.top_shap).map(v => v > 0 ? '#ef4444' : '#22c55e')
            }
        }], {
            title: 'Top SHAP Features',
            paper_abgcolor: 'transparent',
            plot_bgcolor: 'transparent',
            font: { color: 'white' }
        });
    }
}

</script>

</body>
</html>
